<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Login – SkillHub</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">
    <link rel="stylesheet" href="{{ url_for('static', filename='style.css') }}">
</head>

<body class="login-body">

<div class="login-card">

    <div class="auth-brand">
        <div class="auth-brand-icon">⚡</div>
        SkillHub
    </div>

    <h2>Welcome back</h2>
    <p class="auth-subtitle">Sign in to continue to your workspace</p>

    {% with messages = get_flashed_messages(with_categories=true) %}
        {% if messages %}
            {% for category, message in messages %}
                <div class="auth-alert {{ 'error' if category == 'danger' else '' }}">{{ message }}</div>
            {% endfor %}
        {% endif %}
    {% endwith %}

    <form method="POST" action="/login">

        <div class="mb-3">
            <label class="form-label">Email</label>
            <input type="email" name="email" class="form-control" placeholder="you@example.com" required>
        </div>

        <div class="mb-4">
            <label class="form-label">Password</label>
            <input type="password" name="password" class="form-control" placeholder="••••••••" required>
        </div>

        <button type="submit" class="btn btn-primary w-100">
            Sign in
        </button>

    </form>

    <div class="auth-divider"><span>or</span></div>

    <div class="link-area">
        <a href="/register">Don't have an account? <strong>Create one</strong></a>
    </div>

</div>

</body>
</html>
